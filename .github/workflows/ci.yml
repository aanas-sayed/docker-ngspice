name: CI

on:
  push:
  pull_request:
  schedule:
    # Check for a new ngspice release every Monday 04:00 UTC
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  # ── Decide whether this run should publish to Docker Hub ──────────────────
  # Publishes on:
  #   - push to main                              (always)
  #   - workflow_dispatch on main                 (always)
  #   - scheduled run AND a new ngspice tag has appeared upstream
  # Never publishes on pull requests or non-main branches.
  check:
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.decide.outputs.value }}
    steps:
      - name: Fetch latest ngspice tag
        if: github.event_name == 'schedule'
        id: tag
        run: |
          TAG=$(git ls-remote --tags --refs \
              https://git.code.sf.net/p/ngspice/ngspice 'refs/tags/ngspice-*' \
            | awk '{print $2}' | sed 's|refs/tags/||' \
            | grep -E '^ngspice-[0-9]+(\.[0-9]+)?$' \
            | sort -V | tail -n1)
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check tag cache
        if: github.event_name == 'schedule'
        id: cache
        uses: actions/cache@v4
        with:
          path: .ngspice-tag-sentinel
          key: ngspice-tag-${{ steps.tag.outputs.value }}

      - name: Update tag sentinel
        if: github.event_name == 'schedule' && steps.cache.outputs.cache-hit != 'true'
        run: echo "${{ steps.tag.outputs.value }}" > .ngspice-tag-sentinel

      - name: Decide
        id: decide
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" && "${{ steps.cache.outputs.cache-hit }}" == "true" ]]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
            echo "ngspice tag unchanged — skipping publish."
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build + test natively on each supported host ──────────────────────────
  # Unlike the LTspice image (amd64-only), ngspice is built from source so we
  # get a true native image per architecture. Each runner builds and tests its
  # own arch — no QEMU needed.
  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            name: amd64-linux
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            name: arm64-linux
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    name: build-test (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set cache week key
        run: echo "CACHE_WEEK=$(date -u +%Y-W%V)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: docker-ngspice:ci
          cache-from: type=gha,scope=ngspice-${{ matrix.name }}-w${{ env.CACHE_WEEK }}
          cache-to: type=gha,scope=ngspice-${{ matrix.name }}-w${{ env.CACHE_WEEK }},mode=max

      - name: Run simulation test
        run: |
          chmod +x test.sh
          ./test.sh docker-ngspice:ci

      - name: Upload simulation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc_filter_log-${{ matrix.name }}
          path: test/output.log
          if-no-files-found: warn

  # ── Publish to Docker Hub (only after tests pass, only when appropriate) ──
  publish:
    needs: [check, build-test]
    if: needs.check.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set cache week key
        run: echo "CACHE_WEEK=$(date -u +%Y-W%V)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tags:
      #   latest              – always the newest image
      #   YYYY.MM.DD          – date of this build (overwritten if rebuilt same day)
      #   YYYY.MM.DD-<sha>    – unique per commit; preserves same-day rebuilds
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: aanas0sayed/docker-ngspice
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYY.MM.DD'}}
            type=raw,value={{date 'YYYY.MM.DD'}}-{{sha}}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Read from the per-arch caches warmed natively in build-test —
          # avoids re-doing the slow arm64 build under QEMU emulation.
          cache-from: |
            type=gha,scope=ngspice-amd64-linux-w${{ env.CACHE_WEEK }}
            type=gha,scope=ngspice-arm64-linux-w${{ env.CACHE_WEEK }}
